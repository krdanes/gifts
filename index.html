<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#222;
  --muted:#666;
  --blue:#2f6fe4;
  --blue-dark:#255dcc;
  --green:#28a745;
  --border:#dfe5ef;
}
*{box-sizing:border-box}
body{
  font-family:Arial,sans-serif;
  max-width:760px;
  margin:auto;
  padding:18px;
  background:var(--bg);
  color:var(--text);
  line-height:1.45;
}
#app{
  background:var(--card);
  border-radius:18px;
  padding:20px 18px 24px;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
}
button{
  padding:12px 16px;
  margin:6px 6px 0 0;
  border-radius:12px;
  border:none;
  background:var(--blue);
  color:white;
  font-size:16px;
  font-weight:600;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
  transition:all .18s ease;
  cursor:pointer;
}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(1px)}
button:disabled{opacity:.55;cursor:not-allowed;transform:none}
.selected{background:var(--green)}
.progress{
  height:12px;
  background:#e7ecf4;
  border-radius:999px;
  overflow:hidden;
  border:1px solid var(--border);
  margin:8px 0 10px;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--blue),var(--green));
  border-radius:999px;
  transition:width .25s ease;
}
.small{font-size:14px;color:var(--muted)}
.level-buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.level-buttons button{margin:0}
.assessment-options{display:flex;flex-direction:column;gap:18px;margin-top:14px}
.assessment-option{background:#f8f9fb;border:1px solid var(--border);border-radius:14px;padding:14px 14px 16px}
.assessment-option h4{margin:0 0 6px;font-size:18px;color:#1f2d3d}
.assessment-option p{margin:0 0 12px;color:#555;line-height:1.4}
.option-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.recommended-pill{
  box-shadow:0 1px 2px rgba(0,0,0,.08);font-size:12px;font-weight:700;color:#255dcc;background:#eef4ff;border:1px solid #c9d9ff;border-radius:999px;padding:4px 9px}
.gold-btn{background:#C9A646 !important;color:#fff !important;font-weight:700}
.gold-btn:hover{transform:translateY(-1px)}
.assessment-header{margin:0 0 8px}
.assessment-header-title{font-size:18px;font-weight:700;color:var(--blue-dark);line-height:1.2;margin:0}
.progress-meta{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
.progress-pill{background:#eef4ff;color:var(--blue-dark);border:1px solid #c9d9ff;font-size:13px;padding:7px 11px;border-radius:999px;font-weight:600}
.question-card{margin-top:10px;border:1px solid var(--border);border-radius:16px;padding:16px;background:#fbfcfe}
.answer-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.answer-row button{min-width:56px;margin:0}
.nav-row{display:flex;justify-content:space-between;gap:12px;margin-top:14px}
.nav-row .spacer{flex:1}
.results-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.results-actions button{margin:0}
canvas{margin-top:18px;width:100% !important;max-width:100%;background:white;border-radius:12px}
h2,h3{margin-top:0}
@media (max-width:600px){
  body{padding:14px}
  #app{padding:18px 16px 22px}
  .level-buttons{flex-direction:column}
  .level-buttons button{width:100%}
  .assessment-option button{width:100%}
  .assessment-header{margin-bottom:10px}
  .assessment-header-title{font-size:17px}
  .answer-row{display:grid;grid-template-columns:1fr}
  .answer-row button{width:100%;text-align:left;min-height:50px}
  .nav-row button{flex:1;margin:0}
  .results-actions{flex-direction:column}
  .results-actions button{width:100%}
}

.disclaimer{
  background:#f8f9fb;
  border-radius:12px;
  padding:14px 14px 12px;
  margin:16px 0 18px;
  border:1px solid var(--border);
}

.disclaimer h3{
  margin:0 0 6px;
  font-size:16px;
}

.disclaimer em{
  color:#555;
  font-size:13px;
  display:block;
}
.app-header{text-align:center;margin-bottom:18px;}
.app-header h1{margin:0;font-size:24px;color:#2f6fe4;}
.subtitle{font-size:14px;color:#666;margin-top:4px;}
.top-cards{display:grid;gap:18px;margin-top:10px;}
.top-card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,0.08);border-left:6px solid #2f6fe4;}
.top-1{border-left-color:#28a745;}
.score{font-size:14px;color:#666;margin-left:6px;}
.card-highlight{color:#2f6fe4;font-weight:600;margin-bottom:10px;}
.results-cards{display:grid;grid-template-columns:1fr;gap:16px;margin-top:20px;}
@media (min-width:768px){.results-cards{grid-template-columns:repeat(3,1fr);}}
.result-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,0.08);border-left:6px solid #ccc;}
.card-top{border-left-color:#28a745;}
.card-mid{border-left-color:#2f6fe4;}
.card-low{border-left-color:#f59e0b;}


.global-footer-note{
  margin-top:30px;
  padding:14px 0;
  border-top:1px solid #dfe5ef;
}
.footer-inner{
  max-width:760px;
  margin:auto;
  padding:0 18px;
  font-size:12px;
  color:#777;
  line-height:1.5;
  text-align:left;
}

function calculateScores(){
  const scores = {};

  answers.forEach((answer, index) => {
    const q = list[index];
    const gift = q.gift;

    let type = "AFO";
    if(q.type === "Effort" || q.type === "Cost") type = "EC";

    if (!scores[gift]) {
      scores[gift] = { AFO: 0, EC: 0, countAFO:0, countEC:0, total:0 };
    }

    if(type === "AFO"){
      scores[gift].AFO += answer;
      scores[gift].countAFO++;
    } else {
      scores[gift].EC += answer;
      scores[gift].countEC++;
    }
  });

  Object.keys(scores).forEach(gift=>{
    const s = scores[gift];
    const afoAvg = s.AFO / (s.countAFO || 1);
    const ecAvg = s.EC / (s.countEC || 1);
    s.total = (afoAvg * 0.7) + (ecAvg * 0.3);
  });

  return scores;
}

<script>

// ===== SINGLE CLEAN PDF ENGINE =====
function buildPdfCard(card) {
  const pdfCard = document.createElement("div");
  pdfCard.className = "pdf-top-card" + (card.classList.contains("top-1") ? " top-1" : "");

  const titleNode = card.querySelector("h3");
  const scoreNode = titleNode ? titleNode.querySelector(".score") : null;
  const titleText = titleNode ? titleNode.childNodes[0].textContent.replace(/—\s*$/, "").trim() : "";
  const scoreText = scoreNode ? scoreNode.textContent.trim() : "";
  const highlight = card.querySelector(".card-highlight")?.textContent.trim() || "";

  const fields = {};
  card.querySelectorAll("p").forEach(p => {
    const text = p.innerText.trim();
    const lower = text.toLowerCase();
    if (lower.startsWith("what this means:")) fields.meaning = text.replace(/what this means:\s*/i, "");
    else if (lower.startsWith("what others experience:")) fields.experience = text.replace(/what others experience:\s*/i, "");
    else if (lower.startsWith("biblical example:")) fields.example = text.replace(/biblical example:\s*/i, "");
    else if (lower.startsWith("scripture:")) fields.scripture = text.replace(/scripture:\s*/i, "");
  });

  pdfCard.innerHTML = `
    <div class="pdf-top-card-header">
      <div class="pdf-top-card-title">${titleText}</div>
      <div class="pdf-score-wrap">
        <div class="pdf-score-value">${scoreText}</div>
        <div class="pdf-score-label">${highlight}</div>
      </div>
    </div>
    <div class="pdf-columns">
      <div class="pdf-col">
        <p class="pdf-field"><strong>What this means</strong>${fields.meaning || ""}</p>
        <p class="pdf-field pdf-muted"><strong>Scripture</strong>${fields.scripture || ""}</p>
      </div>
      <div class="pdf-col pdf-col-right">
        <p class="pdf-field"><strong>What others experience</strong>${fields.experience || ""}</p>
        <p class="pdf-field pdf-muted"><strong>Biblical Example</strong>${fields.example || ""}</p>
      </div>
    </div>
  `;

  return pdfCard;
}

function getCanvasImage(canvas) {
  if (!canvas) return null;
  const img = document.createElement("img");
  img.src = canvas.toDataURL("image/png");
  img.alt = "Chart";
  return img;
}

function ensurePdfRoot() {
  let root = document.getElementById("pdf-root");
  if (!root) {
    root = document.createElement("div");
    root.id = "pdf-root";
    root.setAttribute("aria-hidden", "true");
    document.body.appendChild(root);
  }
  root.innerHTML = "";
  return root;
}

function buildPdfPages() {
  const root = ensurePdfRoot();
  const header = document.querySelector(".app-header");
  const cards = Array.from(document.querySelectorAll(".top-cards .top-card"));
  const bar = document.getElementById("bar");
  const radar = document.getElementById("radar");
  const summary = document.querySelector(".results-cards");

  if (!header || !cards.length || !bar || !radar) {
    throw new Error("Results view is not ready for PDF generation.");
  }

  const page1 = document.createElement("section");
  page1.className = "pdf-page page-1";
  page1.appendChild(header.cloneNode(true));
  const title = document.createElement("h2");
  title.className = "pdf-section-title";
  title.textContent = "Your Primary Gifts";
  page1.appendChild(title);
  const grid = document.createElement("div");
  grid.className = "pdf-top-grid";
  cards.slice(0, 3).forEach(card => grid.appendChild(buildPdfCard(card)));
  page1.appendChild(grid);
  root.appendChild(page1);

  const page2 = document.createElement("section");
  page2.className = "pdf-page page-2";
  const barWrap = document.createElement("div");
  barWrap.className = "pdf-chart-wrap";
  const barImg = getCanvasImage(bar);
  if (barImg) barWrap.appendChild(barImg);
  page2.appendChild(barWrap);
  root.appendChild(page2);

  const page3 = document.createElement("section");
  page3.className = "pdf-page page-3";
  const radarWrap = document.createElement("div");
  radarWrap.className = "pdf-radar-wrap";
  const radarImg = getCanvasImage(radar);
  if (radarImg) radarWrap.appendChild(radarImg);
  page3.appendChild(radarWrap);
  if (summary) {
    const summaryWrap = document.createElement("div");
    summaryWrap.className = "pdf-summary";
    summaryWrap.appendChild(summary.cloneNode(true));
    page3.appendChild(summaryWrap);
  }
  root.appendChild(page3);

  return Array.from(root.querySelectorAll(".pdf-page"));
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4");

  const capture = async (el) => {
    return await html2canvas(el, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff"
    });
  };

  const pages = buildPdfPages();

  for (let idx = 0; idx < pages.length; idx++) {
    const canvas = await capture(pages[idx]);
    const imgData = canvas.toDataURL("image/png");
    const pageWidth = 210;
    const pageHeight = 297;
    if (idx > 0) pdf.addPage();
    pdf.addImage(imgData, "PNG", 0, 0, pageWidth, pageHeight);
  }

  pdf.save("Spiritual_Gifts_Results.pdf");
}

</script>
