// ===== UPDATED LEVEL 2 SCORING =====
function calculateScores(){
  const scores = calculateScores();

  answers.forEach((answer, index) => {
    const q = list[index];
    const gift = q.gift;

    // Map types
    let type = "AFO";
    if(q.type === "Effort" || q.type === "Cost") type = "EC";

    if (!scores[gift]) {
      scores[gift] = { AFO: 0, EC: 0, countAFO:0, countEC:0, total:0 };
    }

    if(type === "AFO"){
      scores[gift].AFO += answer;
      scores[gift].countAFO++;
    } else {
      scores[gift].EC += answer;
      scores[gift].countEC++;
    }
  });

  Object.keys(scores).forEach(gift=>{
    const s = scores[gift];
    const afoAvg = s.AFO / (s.countAFO || 1);
    const ecAvg = s.EC / (s.countEC || 1);
    s.total = (afoAvg * 0.7) + (ecAvg * 0.3);
  });

  return scores;
}



// ===== SAFE PDF FUNCTION =====
async function downloadPDF_clean() {
  const { jsPDF } = window.jspdf;
  const element = document.getElementById("app");

  const canvas = await html2canvas(element, { scale: 2, useCORS: true });
  const imgData = canvas.toDataURL("image/png");

  const pdf = new jsPDF("p", "mm", "a4");
  const pageWidth = 210;
  const pageHeight = 297;

  const imgWidth = pageWidth;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  pdf.save("Spiritual_Gifts_Results.pdf");
}

  const text = document.getElementById("app").innerText;

  if (navigator.share && location.protocol !== "file:") {

      text: text

    navigator.clipboard.writeText(text);

}

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#222;
  --muted:#666;
  --blue:#2f6fe4;
  --blue-dark:#255dcc;
  --green:#28a745;
  --border:#dfe5ef;
}
*{box-sizing:border-box}
body{
  font-family:Arial,sans-serif;
  max-width:760px;
  margin:auto;
  padding:18px;
  background:var(--bg);
  color:var(--text);
  line-height:1.45;
}
#app{
  background:var(--card);
  border-radius:18px;
  padding:20px 18px 24px;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
}
button{
  padding:12px 16px;
  margin:6px 6px 0 0;
  border-radius:12px;
  border:none;
  background:var(--blue);
  color:white;
  font-size:16px;
  font-weight:600;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
  transition:all .18s ease;
  cursor:pointer;
}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(1px)}
button:disabled{opacity:.55;cursor:not-allowed;transform:none}
.selected{background:var(--green)}
.progress{
  height:12px;
  background:#e7ecf4;
  border-radius:999px;
  overflow:hidden;
  border:1px solid var(--border);
  margin:8px 0 10px;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--blue),var(--green));
  border-radius:999px;
  transition:width .25s ease;
}
.small{font-size:14px;color:var(--muted)}
.level-buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.level-buttons button{margin:0}
.progress-meta{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
.progress-pill{background:#eef4ff;color:var(--blue-dark);border:1px solid #c9d9ff;font-size:13px;padding:7px 11px;border-radius:999px;font-weight:600}
.question-card{margin-top:10px;border:1px solid var(--border);border-radius:16px;padding:16px;background:#fbfcfe}
.answer-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.answer-row button{min-width:56px;margin:0}
.nav-row{display:flex;justify-content:space-between;gap:12px;margin-top:14px}
.nav-row .spacer{flex:1}
.results-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.results-actions button{margin:0}
canvas{margin-top:18px;width:100% !important;max-width:100%;background:white;border-radius:12px}
h2,h3{margin-top:0}
@media (max-width:600px){
  body{padding:14px}
  #app{padding:18px 16px 22px}
  .level-buttons{flex-direction:column}
  .level-buttons button{width:100%}
  .answer-row{display:grid;grid-template-columns:1fr}
  .answer-row button{width:100%;text-align:left;min-height:50px}
  .nav-row button{flex:1;margin:0}
  .results-actions{flex-direction:column}
  .results-actions button{width:100%}
}

.disclaimer{
  background:#f8f9fb;
  border-radius:12px;
  padding:14px 14px 12px;
  margin:16px 0 18px;
  border:1px solid var(--border);
}

.disclaimer h3{
  margin:0 0 6px;
  font-size:16px;
}

.disclaimer em{
  color:#555;
  font-size:13px;
  display:block;
}

</style>

function calculateScores(){
  const scores = calculateScores();

  answers.forEach((answer, index) => {
    const q = list[index];
    const gift = q.gift;

    // Map types
    let type = "AFO";
    if(q.type === "Effort" || q.type === "Cost") type = "EC";

    if (!scores[gift]) {
      scores[gift] = { AFO: 0, EC: 0, countAFO:0, countEC:0, total:0 };
    }

    if(type === "AFO"){
      scores[gift].AFO += answer;
      scores[gift].countAFO++;
    } else {
      scores[gift].EC += answer;
      scores[gift].countEC++;
    }
  });

  Object.keys(scores).forEach(gift=>{
    const s = scores[gift];
    const afoAvg = s.AFO / (s.countAFO || 1);
    const ecAvg = s.EC / (s.countEC || 1);
    s.total = (afoAvg * 0.7) + (ecAvg * 0.3);
  });

  return scores;
}

async function downloadPDF_clean() {
  const { jsPDF } = window.jspdf;
  const element = document.getElementById("app");

  const canvas = await html2canvas(element, { scale: 2, useCORS: true });
  const imgData = canvas.toDataURL("image/png");

  const pdf = new jsPDF("p", "mm", "a4");
  const pageWidth = 210;
  const pageHeight = 297;

  const imgWidth = pageWidth;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  pdf.save("Spiritual_Gifts_Results.pdf");
}

// ===== FINAL calculateScores (non-recursive) =====
function calculateScores(){
  const scores = {};
  if (!window.answers || !window.list) return scores;

  answers.forEach((answer, index) => {
    const q = list[index];
    if (!q) return;
    const gift = q.gift;

    let type = "AFO";
    if (q.type === "Effort" || q.type === "Cost") type = "EC";

    if (!scores[gift]) {
      scores[gift] = { AFO: 0, EC: 0, countAFO:0, countEC:0, total:0 };
    }

    if(type === "AFO"){
      scores[gift].AFO += answer;
      scores[gift].countAFO++;
    } else {
      scores[gift].EC += answer;
      scores[gift].countEC++;
    }
  });

  Object.keys(scores).forEach(gift=>{
    const s = scores[gift];
    const afoAvg = s.AFO / (s.countAFO || 1);
    const ecAvg = s.EC / (s.countEC || 1);
    s.total = (afoAvg * 0.7) + (ecAvg * 0.3);
  });

  return scores;
}
